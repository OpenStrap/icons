name: openstrap_icons
description: >-
  OpenStrap illustrated icon set — theme-aware soft-3D WebP icons with a
  drop-in AppIcon widget that resolves light/dark variants automatically.
version: 0.1.0
homepage: https://openstrap.wtf

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/light/
    - assets/dark/
